plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "com.example.xirja_frontend"
    compileSdk = 35
    //ndkVersion = flutter.ndkVersion
    ndkVersion "25.1.8937393"
    flavorDimensions += "bixolonMatrix"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        buildConfig = true
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.xirja_frontend"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 35
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    productFlavors {
        matrixa {
            dimension "bixolonMatrix"
            buildConfigField "boolean", "BIXOLON_SAMPLE_COMPAT", "false"
            buildConfigField "String", "BIXOLON_MATRIX_ID", "\"matrixA\""
            buildConfigField "int", "BIXOLON_MATRIX_TARGET_SDK", "35"
        }
        matrixb {
            dimension "bixolonMatrix"
            buildConfigField "boolean", "BIXOLON_SAMPLE_COMPAT", "true"
            buildConfigField "String", "BIXOLON_MATRIX_ID", "\"matrixB\""
            buildConfigField "int", "BIXOLON_MATRIX_TARGET_SDK", "35"
        }
        matrixc {
            dimension "bixolonMatrix"
            targetSdk = 31
            buildConfigField "boolean", "BIXOLON_SAMPLE_COMPAT", "true"
            buildConfigField "String", "BIXOLON_MATRIX_ID", "\"matrixC\""
            buildConfigField "int", "BIXOLON_MATRIX_TARGET_SDK", "31"
        }
        sampleparity {
            dimension "bixolonMatrix"
            targetSdk = 31
            buildConfigField "boolean", "BIXOLON_SAMPLE_COMPAT", "true"
            buildConfigField "String", "BIXOLON_MATRIX_ID", "\"sampleParity\""
            buildConfigField "int", "BIXOLON_MATRIX_TARGET_SDK", "31"
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }

    packaging {
        resources {
            excludes += [
                    "META-INF/REFACTORINGS.XML",
                    "META-INF/LICENSE*",
                    "META-INF/NOTICE*"
            ]
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation files("libs/bixolon/bixolon_printer_V2.2.10.jar")
    implementation files("libs/bixolon/libcommon_V1.4.4.jar")
}
